<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  
  <link rel="apple-touch-icon" href="https://i.ibb.co/fG0Tw9h1/S-46080025.jpg">
  <link rel="icon" sizes="192x192" href="https://i.ibb.co/fG0Tw9h1/S-46080025.jpg">
  <link rel="shortcut icon" href="https://i.ibb.co/fG0Tw9h1/S-46080025.jpg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // ==========================================
    // 🖼️ COMPONENTS: ไอคอน SVG
    // ==========================================
    const IconPlus = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconHome = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const IconSearch = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconClock = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconFileText = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
    const IconCalendar = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconLoader = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconEye = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const IconEyeOff = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const IconImage = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>;
    const IconList = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
    const IconChevronLeft = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
    const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;

    // ==========================================
    // 🎨 ตัวแปรสีหลักของธีม Sadpraladd.kidlab (มินิมอลขาว-เทา)
    // ==========================================
    const COLORS = {
      blue: '#ECEBE7',       
      pink: '#F8F8F8',       
      purple: '#F5F5F5',     
      orange: '#ECEBE7',     
      bg: '#FBFBF4',         
      white: '#FFFFFF',      
      textMain: '#a5a5a4',   
      textSoft: '#b7b7b6',   
      pinkDeep: '#b7b7b6',   
      blueDeep: '#a5a5a4',   
      purpleDeep: '#a5a5a4', 
      orangeDeep: '#b7b7b6', 
      cardBg: '#FFFFFF',     
      cardBgDone: '#F5F5F5', 
      cardWhite: '#FFFFFF',      
      cardBorder: '#DFDDDB',     
      cardInner: '#F8F8F8',      
      cloudWhite: '#FFFFFF',     
      modalBg: '#FDFCFA',        
      navBarBg: '#FFFFFF',       
      profileBorder: '#DFDDDB',  
      buttonBg: '#FFFFFF',       
      dividerColor: '#DFDDDB',   
      emptyStateBg: '#F8F8F8',   
      calendarBg: '#FFFFFF',     
      searchInputBg: '#FFFFFF',  
      filterBarBg: '#F8F8F8',    
      bannerOverlayBg: '#F8F8F8', 
    };

    // ==========================================
    // 🏷️ ข้อมูลสถานะ 5 ลำดับ พร้อมรูปภาพ
    // ==========================================
    const TASK_STATUSES = [
      { id: 'status_1', label: 'รอคิว', percent: 20, img: 'https://i.ibb.co/0pj6Kb2z/image.png' },
      { id: 'status_2', label: 'กำลังทำ', percent: 40, img: 'https://i.ibb.co/Ldy82pbS/image.png' },
      { id: 'status_3', label: 'รอเช็คงาน', percent: 60, img: 'https://i.ibb.co/bjZ7WTbH/image.png' },
      { id: 'status_4', label: 'แก้ไขงาน', percent: 80, img: 'https://i.ibb.co/KxJ6qB62/image.png' },
      { id: 'status_5', label: 'ส่งงาน', percent: 100, img: 'https://i.ibb.co/PvJPgXJp/image.png' }
    ];

    const formatDriveLink = (url) => {
      if (!url) return '';
      const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match && match[1]) {
        return `https://lh3.googleusercontent.com/d/${match[1]}`;
      }
      return url;
    };

    const FluffyCloud = React.memo(({ top, left, right, bottom, scale = 1, opacity = 0.7, delay = '0s', reverse = false }) => (
      <div className="absolute pointer-events-none drop-shadow-sm z-0" style={{ top, left, right, bottom, opacity, transform: `scale(${scale})` }}>
        <div className={reverse ? 'animate-float-reverse' : 'animate-float'} style={{ animationDelay: delay }}>
          <div className="relative w-40 h-16">
            <div className="absolute bottom-0 left-4 w-32 h-10 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-2 left-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-5 left-10 w-16 h-16 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
            <div className="absolute bottom-1 right-2 w-14 h-14 rounded-full" style={{ backgroundColor: `${COLORS.cloudWhite}e6` }}></div>
          </div>
        </div>
      </div>
    ));

    const DynamicBackground = React.memo(() => (
      <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div className="absolute top-[10%] left-[-10%] w-72 h-72 rounded-full blur-[90px] opacity-40 animate-float" style={{ backgroundColor: COLORS.pink }}></div>
        <div className="absolute bottom-[10%] right-[-10%] w-80 h-80 rounded-full blur-[100px] opacity-30 animate-float-reverse" style={{ backgroundColor: COLORS.blue }}></div>
        <div className="absolute top-[40%] right-[10%] w-48 h-48 rounded-full blur-[80px] opacity-20 animate-float" style={{ backgroundColor: COLORS.purple }}></div>
        <FluffyCloud top="8%" left="-5%" scale={1.5} opacity={0.6} delay="0s" />
        <FluffyCloud top="35%" left="-15%" scale={2.5} opacity={0.3} delay="2.5s" />
        <FluffyCloud bottom="20%" left="5%" scale={1.6} opacity={0.6} delay="3s" />
        <FluffyCloud top="50%" right="-5%" scale={1.8} opacity={0.5} delay="1s" reverse={true} />
      </div>
    ));

    const Header = React.memo(({ isAdmin, setIsAdmin, setShowAuthModal, handleImageUpload, profileImage }) => (
      <div className="px-5 pt-6 pb-2 relative z-10">
        <div className="backdrop-blur-md rounded-[32px] p-4 shadow-xl flex items-center justify-between h-20 relative overflow-hidden group" style={{ backgroundColor: `${COLORS.cardWhite}66`, borderWidth: '1px', borderColor: `${COLORS.cardBorder}80`, boxShadow: '0 20px 25px -5px rgba(0,0,0,0.02)' }}>
          <div className="absolute left-6 top-1/2 -translate-y-1/2 w-24 h-8 blur-xl rounded-full" style={{ backgroundColor: `${COLORS.cardBorder}40` }}></div>
          <div className="flex flex-col justify-center ml-2 relative z-10">
            <div className="flex items-center gap-1">
             <h1 className="text-l font-black italic tracking-tighter flex">
              {"Sadpraladd.kidlab".split('').map((char, index) => (
                <span 
                  key={index} 
                  className={`bg-gradient-to-br from-[${COLORS.textMain}] to-[${COLORS.textSoft}] bg-clip-text text-transparent drop-shadow-sm inline-block animate-text-wave pb-2 ${char === ' ' ? 'w-2.5' : 'pr-[1.5px]'}`} 
                  style={{ animationDelay: `${index * 0.1}s` }}
                >
                  {char}
                </span>
              ))}
            </h1>
              <button onClick={() => isAdmin ? setIsAdmin(false) : setShowAuthModal(true)} className={`px-1.5 py-0.5 ml-1 rounded-full text-[7px] font-black uppercase tracking-widest border shadow-sm transition-all active:scale-95`} style={{ backgroundColor: isAdmin ? `${COLORS.buttonBg}99` : `${COLORS.buttonBg}cc`, color: isAdmin ? COLORS.textMain : '#9ca3af', borderColor: isAdmin ? COLORS.cardBorder : '#e5e7eb' }}>
                {isAdmin ? 'Admin' : 'Guest'}
              </button>
            </div>
            <div className="flex items-center gap-1.5 opacity-70">
              <div className="w-3 h-[1px]" style={{ backgroundColor: COLORS.pinkDeep }}></div>
              <p className="text-[8px] font-black tracking-[0.5em] uppercase" style={{ color: COLORS.purpleDeep }}>Check Q</p>
            </div>
          </div>
          <div onClick={isAdmin ? handleImageUpload : undefined} className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center relative overflow-hidden transition-transform ${isAdmin ? 'cursor-pointer hover:scale-105 active:scale-95' : ''}`} style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.profileBorder }}>
            {profileImage ? (
              <img src={profileImage} alt="Profile" className="w-full h-full object-cover" />
            ) : (
              <>
                <div className="absolute inset-0 opacity-40" style={{ background: `linear-gradient(to top right, ${COLORS.pink}, ${COLORS.blue})` }}></div>
                <span className="text-2xl relative z-10 select-none">🐰</span>
              </>
            )}
          </div>
        </div>
      </div>
    ));

    const ProgressFlower = React.memo(({ progress, todayTasksLength, doneToday, triggerFlowerBounce, isBouncing }) => {
      const bloomScale = Math.max(0.2, progress / 100);
      const isFullBloom = progress === 100 && todayTasksLength > 0;
      const petals = [0, 72, 144, 216, 288].map(angle => {
        const rad = (angle * Math.PI) / 180;
        return { cx: 50 + 15 * Math.sin(rad), cy: 50 - 15 * Math.cos(rad), r: 18 };
      });

      return (
        <div onClick={triggerFlowerBounce} className={`backdrop-blur-sm rounded-[28px] p-3 flex flex-col items-center justify-center shadow-lg h-full relative overflow-hidden transition-all duration-300 cursor-pointer ${isBouncing ? 'scale-95' : 'hover:scale-[1.02]'}`} style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder, boxShadow: '0 10px 15px -3px rgba(0,0,0,0.03)' }}>
          <div className="absolute top-2 left-3 text-[8px] font-black uppercase tracking-tighter opacity-70" style={{ color: COLORS.purpleDeep }}>ความสำเร็จวันนี้</div>
          <div className="relative w-full h-20 flex items-center justify-center mt-2">
            {progress > 0 && (
              <div className="absolute inset-0 pointer-events-none">
                  <div className="absolute top-1/2 left-1/4 w-1.5 h-1.5 rounded-full animate-float-particle-1 opacity-60" style={{ backgroundColor: COLORS.textSoft }}></div>
                  <div className="absolute top-2/3 right-1/4 w-2 h-2 rounded-full animate-float-particle-2 opacity-60" style={{ backgroundColor: COLORS.pinkDeep }}></div>
                  <div className="absolute top-1/3 right-1/3 w-1.5 h-1.5 rounded-full animate-float-particle-3 opacity-60" style={{ backgroundColor: COLORS.cardBorder }}></div>
              </div>
            )}
            <svg viewBox="0 0 100 100" className="w-20 h-20 overflow-visible">
              <g transform="translate(50, 50)">
                  <g className="animate-breathe">
                    <g transform={`scale(${bloomScale})`} className="transition-transform duration-1000 cubic-bezier(0.34, 1.56, 0.64, 1)">
                      <g transform="translate(-50, -50)">
                        {petals.map((p, i) => (
                          <circle key={i} cx={p.cx} cy={p.cy} r={p.r} fill="#ECEBE7" opacity="0.95" className="transition-all duration-700"/>
                        ))}
                        <circle cx="50" cy="50" r="14" fill="#FDFCFA" className="transition-all duration-700" />
                        {isFullBloom && (
                          <g transform="translate(50, 50)" className="animate-fade-in">
                            <path d="M -5 -1 Q -3 -3 -1 -1" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M 1 -1 Q 3 -3 5 -1" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" strokeLinecap="round" />
                            <path d="M -1.5 2 Q 0 4 1.5 2" fill="none" stroke={COLORS.textMain} strokeWidth="1.2" strokeLinecap="round" />
                            <ellipse cx="-6" cy="1" rx="1.5" ry="1" fill={COLORS.textSoft} opacity="0.6"/>
                            <ellipse cx="6" cy="1" rx="1.5" ry="1" fill={COLORS.textSoft} opacity="0.6"/>
                          </g>
                        )}
                      </g>
                    </g>
                  </g>
              </g>
            </svg>
          </div>
          <div className="mt-1 flex items-center gap-1 px-2 py-0.5 rounded-full z-10" style={{ backgroundColor: `${COLORS.buttonBg}99`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
            <span className="text-xs font-black" style={{ color: COLORS.purpleDeep }}>{progress}%</span>
            <div className="w-1 h-1 rounded-full" style={{ backgroundColor: COLORS.cardBorder }}></div>
            <span className="text-[8px] font-bold text-gray-400 uppercase">{doneToday} / {todayTasksLength} งาน</span>
          </div>
        </div>
      );
    });

    const CompactStats = React.memo(({ isAdmin, selectedNextDate, nextQueueDate, handleSetManualDate, waitingCount }) => (
      <div className="backdrop-blur-sm rounded-[28px] p-1 shadow-lg h-full flex overflow-hidden relative group transition-all" style={{ backgroundColor: `${COLORS.cardWhite}cc`, borderWidth: '1px', borderColor: COLORS.cardBorder, boxShadow: '0 10px 15px -3px rgba(0,0,0,0.03)' }}>
          <div className={`flex-1 flex flex-col justify-center items-center p-2 relative rounded-l-[24px] transition-colors overflow-hidden ${isAdmin ? 'hover:bg-white/50 cursor-pointer' : ''}`} style={{ backgroundColor: `${COLORS.orange}66` }}>
            {isAdmin && (
              <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-10" value={selectedNextDate || nextQueueDate} onChange={(e) => handleSetManualDate(e.target.value)} />
            )}
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2 py-0.5 rounded-md text-[7px] font-black shadow-sm border uppercase tracking-wider whitespace-nowrap" style={{ color: COLORS.orangeDeep, backgroundColor: COLORS.buttonBg, borderColor: COLORS.cardBorder }}>NEXT QUEUE</div>
            
            <div className="flex flex-col items-center mt-1 relative z-0 pointer-events-none">
              <span className="text-3xl font-black leading-none tracking-tighter" style={{ color: COLORS.textMain }}>{new Date(nextQueueDate).getDate()}</span>
              <span className="text-[8px] font-black opacity-80 uppercase mt-0.5" style={{ color: COLORS.orangeDeep }}>{new Date(nextQueueDate).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}</span>
            </div>

            {isAdmin && selectedNextDate && (
              <button 
                onClick={(e) => { e.preventDefault(); e.stopPropagation(); handleSetManualDate(''); }} 
                className="absolute bottom-1.5 left-1/2 -translate-x-1/2 z-20 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm border hover:bg-[#F8F8F8] active:scale-90 transition-all"
                style={{ color: COLORS.pinkDeep, backgroundColor: COLORS.buttonBg, borderColor: COLORS.cardBorder }}
                title="กลับไปคำนวณวันว่างอัตโนมัติ"
              >
                AUTO
              </button>
            )}
          </div>

          <div className="my-4 rounded-full" style={{ width: '1px', backgroundColor: `${COLORS.dividerColor}99` }}></div>
          
          <div className="flex-1 flex flex-col justify-center items-center p-2 relative">
            <div className="absolute top-2 left-1/2 -translate-x-1/2 px-2.5 py-0.5 rounded-md text-[7px] font-black shadow-sm border uppercase tracking-wider whitespace-nowrap z-10" style={{ color: COLORS.blueDeep, backgroundColor: COLORS.buttonBg, borderColor: COLORS.cardBorder }}>จำนวนคิวก่อนหน้า</div>
            
            <div className="relative mt-5 flex flex-col items-center">
               <div className="relative">
                 <div className="absolute inset-0 blur-lg rounded-full opacity-40 scale-125" style={{ backgroundColor: COLORS.blue }}></div>
                 <div className="w-11 h-11 rounded-full flex flex-col items-center justify-center shadow-[inset_0_2px_8px_rgba(0,0,0,0.02)] relative z-10" style={{ backgroundColor: COLORS.cardInner, borderWidth: '2px', borderColor: COLORS.blue }}>
                    <span className="text-xl font-black leading-none" style={{ color: COLORS.blueDeep }}>{waitingCount}</span>
                 </div>
               </div>
               <span className="text-[8px] font-black opacity-60 uppercase mt-1.5 relative z-10" style={{ color: COLORS.blueDeep }}>คิว</span>
            </div>
          </div>
      </div>
    ));

    const TaskCard = React.memo(({ task, isAdmin, onEdit, onStatusChange, queueNumber }) => {
      const currentStatusInfo = TASK_STATUSES.find(s => s.id === task.status) || TASK_STATUSES[0];
      const isDone = currentStatusInfo.id === 'status_5';

      const hasTime = task.startTime && task.endTime;
      const [currentTime, setCurrentTime] = useState(new Date());

      useEffect(() => {
          if (!hasTime || isDone) return;
          const timer = setInterval(() => setCurrentTime(new Date()), 1000);
          return () => clearInterval(timer);
      }, [hasTime, isDone]);

      let durationMinutes = null;
      let progressPercent = currentStatusInfo.percent;
      let isRunning = false;
      let isEnded = false;

      if (hasTime && !isDone) {
          const start = new Date(`${task.deadline}T${task.startTime}:00`);
          let end = new Date(`${task.deadline}T${task.endTime}:00`);
          if (end < start) end.setDate(end.getDate() + 1);

          durationMinutes = Math.round((end - start) / 60000);

          if (currentTime >= start && currentTime <= end) {
              isRunning = true;
              const total = end - start;
              const elapsed = currentTime - start;
              progressPercent = Math.max(0, Math.min(100, (elapsed / total) * 100));
          } else if (currentTime > end) {
              progressPercent = 100;
              isEnded = true;
          } else {
              progressPercent = 0;
          }
      } else if (isDone) {
          progressPercent = 100;
      }

      return (
        <div className="flex flex-row items-center w-full mb-3 gap-2 group">
          
          <div className="w-[55px] h-[55px] shrink-0 relative flex items-center justify-center">
             <img 
               key={task.status} 
               src={currentStatusInfo.img} 
               alt={currentStatusInfo.label} 
               className={`w-full h-full object-contain drop-shadow-sm ${!isDone ? 'animate-bounce-slow' : ''}`} 
             />
          </div>

          <div onClick={() => isAdmin && onEdit(task)} className={`flex-1 min-w-0 relative rounded-[22px] py-2 px-3 transition-all border shadow-sm flex flex-col backdrop-blur-sm ${isAdmin ? 'active:scale-[0.97] cursor-pointer' : ''}`} 
            style={{ 
              backgroundColor: isDone ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.85)', 
              borderColor: task.status === 'status_2' ? COLORS.pinkDeep : (isDone ? 'transparent' : COLORS.cardBorder), 
              opacity: isDone ? 0.7 : 1 
            }}>
            
            {task.status === 'status_2' && (
              <div className="absolute inset-0 pointer-events-none z-0">
                <div className="absolute -bottom-2 -left-3 text-[14px] animate-float-particle-1 drop-shadow-sm opacity-50">🌟</div>
                <div className="absolute top-[30%] -left-4 text-[10px] animate-float-particle-3 drop-shadow-sm opacity-50" style={{ animationDelay: '1.5s' }}>🍅</div>
                <div className="absolute -bottom-2 -right-3 text-[14px] animate-float-particle-2 drop-shadow-sm opacity-50" style={{ animationDelay: '0.5s' }}>🍮</div>
                <div className="absolute top-[30%] -right-4 text-[10px] animate-float-particle-1 drop-shadow-sm opacity-50" style={{ animationDelay: '1.2s' }}>🐶</div>
              </div>
            )}

            <div className="relative z-10 flex flex-col">
              
              <div className="flex justify-between items-start">
                <div className="flex flex-col min-w-0 mr-2 flex-1">
                  
                  <div className="flex items-center gap-1.5 min-w-0 mb-0">
                    {queueNumber && (
                      <span className="w-5 h-5 rounded-full flex items-center justify-center shrink-0 shadow-sm text-[9px] font-black border" style={{ backgroundColor: COLORS.cardInner, color: COLORS.textMain, borderColor: COLORS.cardBorder }}>
                        {queueNumber}
                      </span>
                    )}
                    <span className="font-bold text-[14px] truncate" style={{ color: COLORS.textMain }}>{task.client}</span>
                    
                    <span className={`text-[7px] px-1.5 py-0.5 rounded-md font-black uppercase border ${
                      task.channel === 'LINE' ? 'text-[#A7E898] bg-[#A7E898]/10 border-[#A7E898]/20' : 
                      task.channel === 'FB' || task.channel === 'FACEBOOK' ? 'text-[#8CB9E3] bg-[#8CB9E3]/10 border-[#8CB9E3]/20' : 
                      task.channel === 'IG' ? `text-[${COLORS.pinkDeep}] bg-[${COLORS.pinkDeep}]/10 border-[${COLORS.pinkDeep}]/30` : 
                      'bg-white/50 text-gray-400 border-gray-100'
                    }`} style={task.channel === 'IG' ? { color: COLORS.pinkDeep, backgroundColor: `${COLORS.pinkDeep}1a`, borderColor: `${COLORS.pinkDeep}4d` } : {}}>{task.channel}</span>
                    {task.priority === 'urgent' && !isDone && <span className="text-[9px] font-bold animate-pulse bg-white px-2 py-0.5 rounded-full shadow-sm" style={{ color: COLORS.pinkDeep }}>🔥 ด่วน</span>}
                  </div>
                  
                  <div className="truncate mt-0.5">
                    <span className={`text-[10px] font-bold ${isDone ? 'line-through text-gray-300' : 'text-gray-500'}`}>{task.type}</span>
                    {task.details && (
                      <span className={`text-[10px] ml-1 ${isDone ? 'text-gray-300' : 'text-gray-400'}`}>({task.details})</span>
                    )}
                  </div>
                </div>
                
                <div className="flex flex-col items-end gap-1 shrink-0 mt-0.5">
                  <div className="flex items-center gap-1 text-[9px] font-black px-2.5 py-0.5 rounded-lg border shadow-sm" style={{ backgroundColor: COLORS.bg, borderColor: COLORS.white, color: COLORS.textMain }}>
                    <IconCalendar size={11} style={{ color: COLORS.textMain }} />
                    {new Date(task.deadline).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' })}
                  </div>
                  {hasTime && (
                    <div className="flex items-center gap-1 text-[8px] font-black text-gray-400 bg-white/80 px-1.5 py-0.5 rounded-md border border-gray-100 shadow-sm leading-none">
                      <IconClock size={9} /> {task.startTime}-{task.endTime}
                    </div>
                  )}
                </div>
              </div>

              <div className="flex flex-col w-full mt-1">
                 <div className="flex justify-between items-end mb-0.5 px-1">
                    <div className="text-[8px] font-black uppercase tracking-wider flex items-center gap-1">
                       {hasTime && !isDone ? (
                         <span style={{ color: isRunning ? COLORS.pinkDeep : (isEnded ? '#9ca3af' : COLORS.textSoft) }}>
                           {isRunning ? (
                             <span className="flex items-center gap-1">
                               <span className="w-1.5 h-1.5 rounded-full animate-ping" style={{ backgroundColor: COLORS.pinkDeep }}></span> กำลังทำ...
                             </span>
                           ) : (isEnded ? 'หมดเวลา' : 'รอถึงเวลา')}
                         </span>
                       ) : (
                         <span style={{ color: COLORS.textMain }}>ความคืบหน้า</span>
                       )}
                    </div>
                 </div>

                 <div className="flex items-center gap-2 w-full mt-0">

                    <div className="relative flex-1 h-[14px]">
                       <div className="w-full h-full bg-white/80 rounded-full shadow-inner overflow-hidden border border-white/50 absolute inset-0">
                          <div
                            className={`h-full rounded-full transition-all duration-1000 ease-linear ${isRunning ? 'animate-progress-stripes' : ''}`}
                            style={{
                              width: `${progressPercent}%`,
                              backgroundColor: hasTime ? (isRunning ? COLORS.pinkDeep : (isEnded ? '#e5e7eb' : COLORS.textSoft)) : COLORS.textSoft,
                              backgroundImage: isRunning ? 'linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent)' : 'none',
                              backgroundSize: '1rem 1rem'
                            }}
                          ></div>
                       </div>
                       <div 
                         className="absolute top-1/2 -translate-y-1/2 text-[16px] transition-all duration-1000 ease-linear z-10 drop-shadow-md" 
                         style={{ left: `calc(${progressPercent}% - 8px)` }}
                       >
                         🐶
                       </div>
                    </div>

                    <div className="shrink-0 text-right">
                       <span className="text-[9px] font-black" style={{ color: isRunning ? COLORS.pinkDeep : (isEnded ? '#9ca3af' : COLORS.textSoft) }}>
                         {Math.round(progressPercent)}%
                       </span>
                    </div>

                    <div className="shrink-0 flex items-center justify-end">
                       {isAdmin ? (
                         <select 
                           value={task.status}
                           onChange={(e) => { e.stopPropagation(); onStatusChange(task.id, e.target.value); }}
                           onClick={(e) => e.stopPropagation()}
                           className="text-[9px] font-black leading-none outline-none bg-white border shadow-sm rounded-lg px-1.5 py-1 cursor-pointer"
                           style={{ color: COLORS.textMain, borderColor: COLORS.white }}
                         >
                           {TASK_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                         </select>
                       ) : (
                         <span className="text-[9px] font-black flex items-center gap-1 bg-white px-2 py-1 rounded-md border border-gray-100 shadow-sm whitespace-nowrap" style={{ color: COLORS.textMain }}>
                           {currentStatusInfo.label}
                         </span>
                       )}
                    </div>
                 </div>

              </div>
            </div>
          </div>
        </div>
      );
    });

    const CalendarView = React.memo(({ currentMonth, setCurrentMonth, selectedDate, setSelectedDate, today, tasks }) => {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay(); 

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null); 
      for (let i = 1; i <= daysInMonth; i++) days.push(i);

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      return (
        <div className="bg-white/90 backdrop-blur-xl rounded-[32px] p-5 shadow-xl border-[4px] border-white mb-5 animate-fadeIn">
          <div className="flex justify-between items-center mb-4 px-2">
            <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-1.5 rounded-full transition-colors hover:bg-gray-50" style={{ color: COLORS.textSoft }}><IconChevronLeft size={20}/></button>
            <h3 className="font-black text-[16px] tracking-widest" style={{ color: COLORS.textMain }}>{monthNames[month]} {year}</h3>
            <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-1.5 rounded-full transition-colors hover:bg-gray-50" style={{ color: COLORS.textSoft }}><IconChevronRight size={20}/></button>
          </div>
          
          <div className="grid grid-cols-7 gap-1 text-center mb-3">
            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => (
              <div key={d} className="text-[9px] font-black opacity-60 uppercase" style={{ color: COLORS.textSoft }}>{d}</div>
            ))}
          </div>
          
          <div className="grid grid-cols-7 gap-y-3 gap-x-1 text-center">
            {days.map((day, index) => {
              if (!day) return <div key={`empty-${index}`} className="h-10"></div>;
              
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isSelected = selectedDate === dateStr;
              const isToday = today === dateStr;
              const hasTasks = tasks.some(t => t.deadline === dateStr); 

              return (
                <div key={dateStr} className="flex justify-center items-center h-10">
                  <div onClick={() => setSelectedDate(dateStr)} className={`relative w-10 h-10 flex flex-col items-center justify-center cursor-pointer transition-all ${isSelected ? 'text-white rounded-full font-black shadow-md scale-105' : isToday ? 'font-black rounded-full border-[2px] border-white' : 'font-bold hover:border-[2px] hover:border-white hover:shadow-sm rounded-full'}`} style={{ backgroundColor: isSelected ? COLORS.pinkDeep : (isToday ? COLORS.orange : ''), color: isSelected ? COLORS.white : COLORS.textMain }}>
                    <span className="text-[13px] z-10 leading-none">{day}</span>
                    {hasTasks && <div className="absolute bottom-1 w-1.5 h-1.5 rounded-full" style={{ backgroundColor: isSelected ? COLORS.white : COLORS.pinkDeep }}></div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    });

    function App() {
      const [tasks, setTasks] = useState([]);
      const [taskTypes, setTaskTypes] = useState(['Logo', 'Banner', 'Artwork']); 
      const [channels, setChannels] = useState(['LINE', 'FB', 'IG']); 
      
      const [isLoading, setIsLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false); 
      
      const [view, setView] = useState('dashboard');
      const [isCalendarView, setIsCalendarView] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedDate, setSelectedDate] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      });
      
      const [showModal, setShowModal] = useState(false);     
      const [editingTask, setEditingTask] = useState(null);  
      const [taskToDelete, setTaskToDelete] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(false);   
      const [showImageModal, setShowImageModal] = useState(false); 
      const [showBannerModal, setShowBannerModal] = useState(false); 

      // ✨ ประกาศ State ตัวแปรสำหรับฟีเจอร์ช่องรูปที่ 2
      const [showMonthlyImageModal, setShowMonthlyImageModal] = useState(false);
      const [monthlyImage, setMonthlyImage] = useState('');
      const [tempMonthlyImageUrl, setTempMonthlyImageUrl] = useState('');
      
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      
      const [isAdmin, setIsAdmin] = useState(false);
      const [password, setPassword] = useState('');
      const [authError, setAuthError] = useState(false);
      const [isVerifyingAuth, setIsVerifyingAuth] = useState(false);
      
      const [profileImage, setProfileImage] = useState(null);
      const [tempImageUrl, setTempImageUrl] = useState('');   
      const [bannerImage, setBannerImage] = useState(null);   
      const [tempBannerUrl, setTempBannerUrl] = useState(''); 
      const [isBannerVisible, setIsBannerVisible] = useState(true);
      
      const [selectedNextDate, setSelectedNextDate] = useState(''); 
      const [isBouncing, setIsBouncing] = useState(false); 

      // 🎯 State & Effect สำหรับเก็บตำแหน่งที่กด (Click Ripples)
      const [clickRipples, setClickRipples] = useState([]);

      useEffect(() => {
        const handleGlobalClick = (e) => {
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.closest('a') || e.target.closest('form')) return;

          const id = Date.now();
          const x = e.clientX;
          const y = e.clientY;

          const newRipple = { id, x, y };
          setClickRipples(prev => [...prev, newRipple]);

          setTimeout(() => {
            setClickRipples(prev => prev.filter(ripple => ripple.id !== id));
          }, 800);
        };

        window.addEventListener('click', handleGlobalClick);
        return () => window.removeEventListener('click', handleGlobalClick);
      }, []);

      // 🌐 API URL ของ Sadpraladd.kidlab
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKIgSnIOTr7it62jvbWOunaL6FDlLH_Y5xc3kMMkQ85A5hrADYA2B0AJEm0_JfcCV0/exec";

      const fetchAPI = async (payload) => {
        try {
          const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch (error) {
          console.error("API Error:", error);
          throw error;
        }
      };

      useEffect(() => {
        document.title = "Sadpraladd.kidlab"; 
        
        fetch(WEB_APP_URL + "?action=getInitialData")
          .then(res => res.json())
          .then(response => {
            if (response.status === 'success') {
              const formattedTasks = (response.data.tasks || []).map(t => {
                 if (t.status === 'todo') t.status = 'status_1';
                 if (t.status === 'doing') t.status = 'status_2';
                 if (t.status === 'done') t.status = 'status_5';
                 if (!TASK_STATUSES.some(s => s.id === t.status)) {
                    t.status = 'status_1';
                 }
                 return t;
              });

              setTasks(formattedTasks);
              if (response.data.taskTypes && response.data.taskTypes.length > 0) setTaskTypes(response.data.taskTypes);
              if (response.data.channels && response.data.channels.length > 0) setChannels(response.data.channels);
              if (response.data.profileImage) setProfileImage(response.data.profileImage);
              if (response.data.bannerImage) setBannerImage(response.data.bannerImage);
              
              // ✨ ดึงลิงก์รูปช่องที่ 2 จาก Google Sheets เมื่อเริ่มโหลดแอป
              if (response.data.monthlyImage) setMonthlyImage(response.data.monthlyImage);
              
              if (response.data.bannerVisible !== undefined) setIsBannerVisible(response.data.bannerVisible);
              if (response.data.lockedNextDate) setSelectedNextDate(response.data.lockedNextDate);
            }
            setIsLoading(false);
          })
          .catch(error => {
            console.error("Error loading data:", error);
            setIsLoading(false);
          });
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        setIsVerifyingAuth(true);
        setAuthError(false);

        fetchAPI({ action: 'verifyAdminPassword', inputPassword: password })
          .then(res => {
            setIsVerifyingAuth(false);
            if (res.isValid) {
              setIsAdmin(true); setShowAuthModal(false); setPassword(''); setAuthError(false);
            } else setAuthError(true);
          })
          .catch(() => { setIsVerifyingAuth(false); setAuthError(true); });
      };

      const handleSetManualDate = useCallback((dateVal) => {
        setSelectedNextDate(dateVal);
        fetchAPI({ action: 'saveLockedNextDate', dateStr: dateVal }); 
      }, []);
      
      const today = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, []); 
      
      const todayTasks = useMemo(() => tasks.filter(t => t.deadline === today || t.status === 'status_2'), [tasks, today]);
      const doneToday = useMemo(() => todayTasks.filter(t => t.status === 'status_5').length, [todayTasks]);
      const progress = todayTasks.length === 0 ? 0 : Math.round((doneToday / todayTasks.length) * 100);

      const nextQueueDate = useMemo(() => {
        if (selectedNextDate) return selectedNextDate;
        let checkDate = new Date();
        for (let i = 0; i < 365; i++) {
          const y = checkDate.getFullYear(); 
          const m = String(checkDate.getMonth() + 1).padStart(2, '0'); 
          const d = String(checkDate.getDate()).padStart(2, '0'); 
          const dateStr = `${y}-${m}-${d}`;
          const tasksOnDate = tasks.filter(t => t.deadline === dateStr);
          if (tasksOnDate.length === 0) return dateStr;
          checkDate.setDate(checkDate.getDate() + 1);
        }
        return today;
      }, [tasks, selectedNextDate]);

      const waitingCount = useMemo(() => tasks.filter(t => t.status !== 'status_5').length, [tasks]);

      // ✨ ฟังก์ชันคำนวณยอดคิวงานในเดือนปัจจุบัน
      const currentMonthTotal = useMemo(() => {
        const currentMonthKey = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
        return tasks.filter(t => t.deadline && t.deadline.substring(0, 7) === currentMonthKey).length;
      }, [tasks]);

      const handleStatusChange = useCallback((id, newStatus) => {
        setTasks(prev => prev.map(t => {
          if (t.id === id) {
            fetchAPI({ action: 'updateTaskStatus', taskId: id, newStatus: newStatus });
            return { ...t, status: newStatus };
          }
          return t;
        }));
      }, []);

      const handleEditTask = useCallback((task) => {
        setEditingTask(task);
        setShowModal(true);
      }, []);

      const handleSaveTask = (e) => {
        e.preventDefault();
        setIsSaving(true);
        const formData = new FormData(e.target);
        const taskData = {
          id: editingTask ? editingTask.id : null,
          title: '', 
          client: formData.get('client'),
          type: formData.get('type'), 
          channel: formData.get('channel'),
          priority: formData.get('priority') ? 'urgent' : 'normal', 
          deadline: formData.get('deadline'),
          details: formData.get('details'),
          startTime: formData.get('startTime'), 
          endTime: formData.get('endTime'), 
          status: formData.get('status') || 'status_1', 
        };

        fetchAPI({ action: 'saveOrUpdateTask', task: taskData })
          .then(res => {
             if (res.status === 'success') {
               setTasks(prev => editingTask ? prev.map(t => t.id === res.task.id ? res.task : t) : [...prev, res.task]);
             }
             setIsSaving(false); setShowModal(false); setEditingTask(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const executeDeleteTask = () => {
        if (!taskToDelete) return;
        setIsSaving(true);
        fetchAPI({ action: 'deleteTask', taskId: taskToDelete })
          .then(() => {
             setTasks(prev => prev.filter(t => t.id !== taskToDelete));
             setIsSaving(false); setShowModal(false); setEditingTask(null); setTaskToDelete(null);
          })
          .catch(() => { setIsSaving(false); });
      };

      const toggleBannerVisibility = (visible) => {
        setIsBannerVisible(visible);
        fetchAPI({ action: 'saveBannerVisibility', isVisible: visible });
      };

      const triggerFlowerBounce = useCallback(() => { setIsBouncing(true); setTimeout(() => setIsBouncing(false), 500); }, []);
      const handleImageUpload = useCallback(() => { setShowImageModal(true); }, []);

      const filteredAllTasks = useMemo(() => tasks.filter(t => {
        const matchSearch = (t.type || '').toLowerCase().includes(searchQuery.toLowerCase()) || (t.client || '').toLowerCase().includes(searchQuery.toLowerCase());
        const matchFilter = filterType === 'all' || 
                            (filterType === 'pending' && t.status !== 'status_5') || 
                            (filterType === 'done' && t.status === 'status_5');
        return matchSearch && matchFilter;
      }).slice().reverse(), [tasks, searchQuery, filterType]);

      const displayedTasks = isCalendarView 
        ? filteredAllTasks.filter(t => t.deadline === selectedDate) 
        : filteredAllTasks;

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center relative overflow-hidden" style={{ backgroundColor: COLORS.bg }}>
             <DynamicBackground />
             <div className="flex flex-col items-center z-10 animate-breathe">
               <div className="flex items-center gap-1.5 px-6 py-2.5 bg-white/60 backdrop-blur-sm rounded-full border-[2px] border-white shadow-sm">
                 <p className="text-[12px] font-black tracking-widest" style={{ color: COLORS.textMain }}>กำลังโหลดข้อมูล</p>
                 <div className="flex gap-1 pt-1 ml-1">
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.textSoft, animationDelay: '0s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.pinkDeep, animationDelay: '0.15s' }}></span>
                   <span className="w-1.5 h-1.5 rounded-full animate-bounce" style={{ backgroundColor: COLORS.textMain, animationDelay: '0.3s' }}></span>
                 </div>
               </div>
             </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen font-sans relative" style={{ backgroundColor: COLORS.bg, color: COLORS.textMain }}>
          <DynamicBackground />
          
          {/* 🎯 Rendering Heart Shape Ripple & Custom Drawn Sparkles */}
          {clickRipples.map(ripple => (
            <div key={ripple.id} className="fixed pointer-events-none z-[9999]" style={{ left: ripple.x, top: ripple.y }}>
              <svg className="absolute animate-heart-shape-ripple" style={{ color: COLORS.pinkDeep, left: '-24px', top: '-24px' }} width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round">
                <path d="M 12 18 C 8 18 2 13 2 8 C 2 4 5 2 8.5 2 C 10.5 2 11.5 3.5 12 4.5 C 12.5 3.5 13.5 2 15.5 2 C 19 2 22 4 22 8 C 22 13 16 18 12 18 Z"></path>
              </svg>
              <svg className="absolute animate-sparkle-float" style={{ color: COLORS.pinkDeep, left: '-10px', top: '-10px', '--dx': '-25px', '--dy': '-35px', width: '16px', height: '16px' }} viewBox="0 0 24 24">
                <path fill="currentColor" d="M12 0 C12 8 16 12 24 12 C16 12 12 16 12 24 C12 16 8 12 0 12 C8 12 12 8 12 0 Z" />
              </svg>

            )}

            {showBannerModal && (
              <div className="fixed inset-0 z-[120] flex items-center justify-center p-6 bg-black/10 backdrop-blur-[2px] animate-fadeIn">
                <form onSubmit={(e) => { 
                    e.preventDefault(); 
                    if (tempBannerUrl) { 
                      let finalUrl = formatDriveLink(tempBannerUrl);
                      setBannerImage(finalUrl); 
                      toggleBannerVisibility(true);
                      fetchAPI({ action: 'saveBannerImage', imageUrl: finalUrl });
                    } 
                    setShowBannerModal(false); 
                    setTempBannerUrl(''); 
                }} className="bg-white/95 backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl border border-white animate-slideUp">
                   <h3 className="text-sm font-black mb-4 text-center" style={{ color: COLORS.textMain }}>เปลี่ยนแบนเนอร์</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl bg-white border border-gray-100 outline-none text-[11px] shadow-sm transition-all text-center" placeholder="วางลิงก์รูปภาพ Google Drive..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 text-white shadow-lg active:scale-95 transition-all" style={{ backgroundColor: COLORS.pinkDeep }}>Save Banner</button>
                     <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest" style={{ color: COLORS.textSoft }}>Close</button>
                   </div>
                </form>
              </div>
            )}

            {taskToDelete && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/20 backdrop-blur-[2px] animate-fadeIn">
                <div className="bg-white/95 backdrop-blur-xl w-full max-w-[260px] rounded-[30px] p-6 shadow-2xl border border-white animate-slideUp text-center">
                  <div className="w-14 h-14 rounded-full bg-red-50 text-red-400 flex items-center justify-center mx-auto mb-3 shadow-sm border border-red-100">
                     <IconTrash size={26} />
                  </div>
                  <h3 className="text-[14px] font-black mb-1" style={{ color: COLORS.textMain }}>ยืนยันการลบ?</h3>
                  <p className="text-[10px] font-bold text-gray-500 mb-5">คุณต้องการลบคิวงานนี้ใช่หรือไม่<br/>(ไม่สามารถกู้คืนได้)</p>
                  
                  <div className="flex gap-2">
                    <button onClick={() => setTaskToDelete(null)} className="flex-1 py-3 rounded-2xl font-black text-[10px] bg-gray-100 hover:bg-gray-200 active:scale-95 transition-all shadow-sm" style={{ color: COLORS.textMain }}>ยกเลิก</button>
                    <button onClick={executeDeleteTask} className="flex-1 py-3 rounded-2xl font-black text-[10px] text-white bg-red-400 hover:bg-red-500 active:scale-95 transition-all shadow-sm">ลบข้อมูล</button>
                  </div>
                </div>
              </div>
            )}

          </div>
          
          <style>{`
            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            
            /* ✨ Animation สำหรับเส้นขอบรูปหัวใจ (อ้วนกลม ปลายโค้งมน) */
            @keyframes heart-shape-ripple {
              0% { transform: scale(0.3); opacity: 0.8; stroke-width: 4px; }
              20% { transform: scale(0.6); opacity: 1; stroke-width: 3px; }
              100% { transform: scale(2.5); opacity: 0; stroke-width: 1px; }
            }
            .animate-heart-shape-ripple {
              animation: heart-shape-ripple 0.8s ease-out forwards;
              transform-origin: center;
            }

            /* ✨ Animation สำหรับดาววิ้งๆ */
            @keyframes sparkle-float {
              0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
              20% { transform: translate(calc(var(--dx) * 0.2), calc(var(--dy) * 0.2)) scale(1) rotate(20deg); opacity: 1; }
              100% { transform: translate(var(--dx), var(--dy)) scale(0) rotate(90deg); opacity: 0; }
            }
            .animate-sparkle-float {
              animation: sparkle-float 0.8s ease-out forwards;
              opacity: 0;
            }
            
            /* ✨ เพิ่ม Animation ลายเส้นวิ่งสำหรับ Progress Bar */
            @keyframes progress-stripes {
              from { background-position: 1rem 0; }
              to { background-position: 0 0; }
            }
            .animate-progress-stripes {
              animation: progress-stripes 1s linear infinite;
            }
            
            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float-particle-1 { animation: float-particle-1 3s ease-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 4s ease-out infinite 1s; }
            .animate-float-particle-3 { animation: float-particle-3 3.5s ease-out infinite 0.5s; }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 18s ease-in-out infinite; }
            .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 4s linear infinite; }
            
            /* Checkbox Custom Color */
            input:checked + div {
              background-color: ${COLORS.pinkDeep} !important;
            }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
